services:

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:25.0.5
    ports:
      - 9090:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - keycloak_data:/opt/keycloak/data
    command:
      - 'start-dev'
  redis:
    container_name: redis
    image: redis:8.6.3
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  keycloak_data:
