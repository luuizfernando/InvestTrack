server:
    port: 9000

spring:
    application:
        name: gateway

    security:
        oauth2:
            client:
                registration:
                    keycloak:
                        client-id: gateway
                        client-secret: rXtvouqhuoOHMZAl7rwGhWwsVd8MNlt7
                        scope: openid, profile, email
                provider:
                    keycloak:
                        issuer-uri: http://localhost:9090/realms/investtrack
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:9090/realms/investtrack
    data:
        redis:
            host: localhost
            port: 6379

    cloud:
        gateway:
            routes:
                - id: admin-service
                  uri: http://localhost:8081
                  predicates:
                      - Path=/admin/**
                  filters:
                      - TokenRelay=
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@remoteAddrKeyResolver}"
